<title>亲子跑活动签到</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px 16px;
  }
  .container { max-width: 480px; margin: 0 auto; }
  
  /* 头部 */
  .header {
    text-align: center;
    color: white;
    margin-bottom: 24px;
  }
  .header h1 { font-size: 26px; margin-bottom: 6px; }
  .header p { font-size: 14px; opacity: 0.9; }
  
  /* 搜索区域 */
  .search-box {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .search-box label {
    display: block;
    font-size: 14px;
    color: #666;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .search-input-wrap {
    display: flex;
    gap: 10px;
  }
  .search-input {
    flex: 1;
    padding: 14px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: #667eea; }
  .search-btn {
    padding: 14px 24px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .search-btn:active { transform: scale(0.96); }
  .search-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  
  /* 结果区域 */
  .result-box {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    display: none;
  }
  .result-box.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  /* 家长信息 */
  .parent-info {
    padding-bottom: 16px;
    border-bottom: 1px dashed #e0e0e0;
    margin-bottom: 16px;
  }
  .parent-info h2 {
    font-size: 20px;
    color: #333;
    margin-bottom: 8px;
  }
  .parent-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 13px;
    color: #666;
  }
  .parent-meta span {
    background: #f5f5f5;
    padding: 4px 10px;
    border-radius: 20px;
  }
  
  /* 孩子卡片 */
  .child-card {
    border: 2px solid #f0f0f0;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .child-card:last-child { margin-bottom: 0; }
  .child-card.received { border-color: #4caf50; background: #f8fff8; }
  .child-card.received::before {
    content: "✓ 已领取";
    position: absolute;
    top: 10px;
    right: 10px;
    background: #4caf50;
    color: white;
    font-size: 11px;
    font-weight: bold;
    padding: 3px 10px;
    border-radius: 20px;
  }
  
  .child-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .child-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    flex-shrink: 0;
  }
  .child-avatar.boy { background: #e3f2fd; color: #1976d2; }
  .child-avatar.girl { background: #fce4ec; color: #c2185b; }
  .child-avatar.unknown { background: #f5f5f5; color: #666; }
  .child-name {
    font-size: 18px;
    font-weight: 700;
    color: #333;
  }
  .child-raw {
    font-size: 12px;
    color: #999;
    margin-top: 2px;
  }
  
  .child-details {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  .detail-item {
    text-align: center;
    padding: 10px 6px;
    background: #fafafa;
    border-radius: 10px;
  }
  .detail-item .label {
    font-size: 11px;
    color: #999;
    margin-bottom: 4px;
  }
  .detail-item .value {
    font-size: 16px;
    font-weight: 700;
    color: #333;
  }
  .detail-item .value.size { color: #e53935; font-size: 20px; }
  
  /* 领取按钮 */
  .receive-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .receive-btn:not(.received) {
    background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(238, 90, 36, 0.3);
  }
  .receive-btn:not(.received):active { transform: scale(0.98); }
  .receive-btn.received {
    background: #e8f5e9;
    color: #4caf50;
    cursor: default;
  }
  
  /* 统计栏 */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    padding: 14px 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 12px;
    margin-bottom: 16px;
    color: white;
  }
  .stat-item { text-align: center; }
  .stat-item .num { font-size: 22px; font-weight: 700; }
  .stat-item .label { font-size: 11px; opacity: 0.85; }
  
  /* 空状态 */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #999;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  
  /* 底部 */
  .footer {
    text-align: center;
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    margin-top: 24px;
    padding-bottom: 20px;
  }
  
  /* 提示消息 */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: #333;
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 1000;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  
  /* 重置按钮 */
  .reset-link {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: #999;
    cursor: pointer;
    text-decoration: underline;
  }
  .reset-link:hover { color: #667eea; }
</style>

</div>

// ===== 状态管理 =====
function getStorageKey() { return 'parent_run_2025_received'; }

function getReceivedState() {
  try {
    return JSON.parse(localStorage.getItem(getStorageKey()) || '{}');
  } catch { return {}; }
}

function setChildReceived(phone, childIndex, received) {
  const state = getReceivedState();
  if (!state[phone]) state[phone] = {};
  state[phone][childIndex] = received;
  localStorage.setItem(getStorageKey(), JSON.stringify(state));
  updateStats();
}

function isChildReceived(phone, childIndex) {
  const state = getReceivedState();
  return state[phone] && state[phone][childIndex] === true;
}

// ===== 统计 =====
function updateStats() {
  let totalKids = 0;
  let receivedKids = 0;
  const state = getReceivedState();
  
  registrations.forEach(reg => {
    totalKids += reg.children.length;
    if (state[reg.phone]) {
      reg.children.forEach((_, idx) => {
        if (state[reg.phone][idx]) receivedKids++;
      });
    }
  });
  
  document.getElementById('statTotal').textContent = registrations.length;
  document.getElementById('statKids').textContent = totalKids;
  document.getElementById('statReceived').textContent = receivedKids;
}

// ===== 搜索 =====
function searchPhone() {
  const input = document.getElementById('phoneInput');
  const phone = input.value.trim();
  
  if (!phone) {
    showToast('请输入手机号');
    return;
  }
  if (!/^\d{11}$/.test(phone)) {
    showToast('请输入11位手机号');
    return;
  }
  
  const reg = registrations.find(r => r.phone === phone);
  if (!reg) {
    showToast('未找到该手机号的报名信息');
    return;
  }
  
  renderResult(reg);
}

function renderResult(reg) {
  const resultBox = document.getElementById('resultBox');
  const content = document.getElementById('resultContent');
  
  let childrenHtml = '';
  reg.children.forEach((child, idx) => {
    const received = isChildReceived(reg.phone, idx);
    const genderClass = child.gender === '男' ? 'boy' : (child.gender === '女' ? 'girl' : 'unknown');
    const genderEmoji = child.gender === '男' ? '👦' : (child.gender === '女' ? '👧' : '👶');
    const btnText = received ? '✓ 已领取衣服' : '👕 点击领取衣服';
    const btnClass = received ? 'received' : '';
    const cardClass = received ? 'received' : '';
    
    childrenHtml += `
      <div class="child-card {cardClass}" id="childCard_{idx}">
        <div class="child-header">
          <div class="child-avatar {genderClass}">{genderEmoji}</div>
          <div>
            <div class="child-name">{child.name}</div>
            <div class="child-raw">{child.raw}</div>
          </div>
        </div>
        <div class="child-details">
          <div class="detail-item">
            <div class="label">性别</div>
            <div class="value">{child.gender}</div>
          </div>
          <div class="detail-item">
            <div class="label">年龄</div>
            <div class="value">{child.age || '-'}</div>
          </div>
          <div class="detail-item">
            <div class="label">身高/尺码</div>
            <div class="value size">{child.height || '-'}</div>
          </div>
        </div>
        <button class="receive-btn {btnClass}" id="btn_{idx}" onclick="toggleReceive('{reg.phone}', {idx})">
          {btnText}
        </button>
      </div>
    `;
  });
  
  content.innerHTML = `
    <div class="parent-info">
      <h2>👤 {reg.name}</h2>
      <div class="parent-meta">
        <span>📱 {reg.phone}</span>
        <span>🎓 {reg.grade}</span>
        <span>👶 {reg.children.length}个孩子</span>
        {reg.remark && reg.remark !== '无' ? '<span>📝 ' + reg.remark + '</span>' : ''}
      </div>
    </div>
    <div class="children-list">
      {childrenHtml}
    </div>
  `;
  
  resultBox.classList.add('show');
  document.querySelector('.search-box').style.display = 'none';
}

function toggleReceive(phone, childIndex) {
  const received = isChildReceived(phone, childIndex);
  if (received) {
    // 已领取，询问是否取消
    if (!confirm('该孩子已标记为领取，是否取消？')) return;
    setChildReceived(phone, childIndex, false);
  } else {
    setChildReceived(phone, childIndex, true);
    showToast('✓ 领取成功！');
  }
  
  // 重新渲染该卡片状态
  refreshCard(phone, childIndex);
}

function refreshCard(phone, childIndex) {
  const reg = registrations.find(r => r.phone === phone);
  if (!reg) return;
  const child = reg.children[childIndex];
  const received = isChildReceived(phone, childIndex);
  
  const card = document.getElementById('childCard_' + childIndex);
  const btn = document.getElementById('btn_' + childIndex);
  
  if (received) {
    card.classList.add('received');
    btn.classList.add('received');
    btn.textContent = '✓ 已领取衣服';
  } else {
    card.classList.remove('received');
    btn.classList.remove('received');
    btn.textContent = '👕 点击领取衣服';
  }
}

function resetSearch() {
  document.getElementById('resultBox').classList.remove('show');
  document.querySelector('.search-box').style.display = 'block';
  document.getElementById('phoneInput').value = '';
  document.getElementById('phoneInput').focus();
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== 初始化 =====
document.getElementById('phoneInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') searchPhone();
});

updateStats();
</script>
