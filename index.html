<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亲子跑活动签到</title>
<style>
  body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 20px; }
  .search-box { background: #f5f5f5; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
  input { width: 100%; padding: 10px; font-size: 16px; margin-bottom: 10px; }
  button { width: 100%; padding: 12px; font-size: 16px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
  .result { background: #f0f0f0; padding: 15px; border-radius: 10px; margin-top: 20px; }
  .child { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; border: 2px solid #ddd; }
  .child.received { border-color: #4caf50; }
  .btn { margin-top: 10px; padding: 10px; background: #ff6b6b; color: white; border: none; border-radius: 5px; cursor: pointer; }
  .btn.received { background: #4caf50; }
  .debug { background: #333; color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 10px; white-space: pre-wrap; }
</style>
</head>
<body>
  <div class="header">
    <h1>🏃 亲子跑活动签到</h1>
  </div>
  
  <div class="search-box">
    <input type="tel" id="phoneInput" placeholder="输入11位手机号" maxlength="11">
    <button onclick="search()">查询</button>
    <div class="debug" id="debug">调试信息将显示在这里...</div>
  </div>
  
  <div id="result"></div>

<script>
// 简化的测试数据
const registrations = [
  {"name":"安柯","phone":"18301443350","children":[{"name":"柠檬","gender":"男","age":"3岁","height":"105㎝"}]},
  {"name":"陈芳","phone":"13510084071","children":[{"name":"一蔓","gender":"女","age":"11岁","height":"145cm"},{"name":"墨墨","gender":"女","age":"11岁","height":"150cm"}]},
  {"name":"陈俊","phone":"13902942749","children":[{"name":"依依","gender":"女","age":"9岁","height":"140cm"}]}
];

function search() {
  const input = document.getElementById('phoneInput');
  const phone = input.value.trim();
  const debug = document.getElementById('debug');
  const result = document.getElementById('result');
  
  // 调试信息
  let debugInfo = '=== 调试信息 ===\n';
  debugInfo += '输入: [' + phone + ']\n';
  debugInfo += '长度: ' + phone.length + '\n';
  debugInfo += '类型: ' + typeof phone + '\n';
  debugInfo += '正则测试: ' + /^\d{11}$/.test(phone) + '\n';
  debugInfo += '数据条数: ' + registrations.length + '\n';
  debugInfo += '第一条手机号: [' + registrations[0].phone + ']\n';
  debugInfo += '第一条类型: ' + typeof registrations[0].phone + '\n';
  debugInfo += '严格相等: ' + (phone === registrations[0].phone) + '\n';
  
  // 尝试查找
  const reg = registrations.find(r => r.phone === phone);
  debugInfo += '查找结果: ' + (reg ? '找到 ' + reg.name : '未找到') + '\n';
  
  // 显示所有手机号
  debugInfo += '\n所有手机号:\n';
  registrations.forEach((r, i) => {
    debugInfo += (i+1) + '. [' + r.phone + ']\n';
  });
  
  debug.textContent = debugInfo;
  
  if (!reg) {
    result.innerHTML = '<div style="color:red; text-align:center; padding:20px;">未找到该手机号的报名信息</div>';
    return;
  }
  
  // 显示结果
  let html = '<h2>👤 ' + reg.name + ' (' + reg.phone + ')</h2>';
  reg.children.forEach((child, idx) => {
    html += '<div class="child" id="child' + idx + '" style="margin-bottom:15px">';
    html += '<h3>' + child.name + ' ' + (child.gender === '男' ? '👦' : '👧') + '</h3>';
    html += '<p>年龄: ' + child.age + ' | 身高: ' + child.height + '</p>';
    html += '<button class="btn" id="btn' + idx + '" onclick="receive(' + idx + ')">👕 点击领取衣服</button>';
    html += '</div>';
  });
  result.innerHTML = html;
}

function receive(idx) {
  const btn = document.getElementById('btn' + idx);
  const card = document.getElementById('child' + idx);
  if (btn.textContent.includes('已领取')) {
    btn.textContent = '👕 点击领取衣服';
    btn.classList.remove('received');
    card.classList.remove('received');
  } else {
    btn.textContent = '✓ 已领取衣服';
    btn.classList.add('received');
    card.classList.add('received');
  }
}

// 回车搜索
document.getElementById('phoneInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') search();
});
</script>
</body>
</html>
