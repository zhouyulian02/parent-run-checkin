<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>亲子跑活动签到</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px 16px;
  }
  .container { max-width: 480px; margin: 0 auto; }
  .header { text-align: center; color: white; margin-bottom: 24px; }
  .header h1 { font-size: 26px; margin-bottom: 6px; }
  .header p { font-size: 14px; opacity: 0.9; }
  
  .stats-bar {
    display: flex;
    justify-content: space-between;
    padding: 14px 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 12px;
    margin-bottom: 16px;
    color: white;
  }
  .stat-item { text-align: center; }
  .stat-item .num { font-size: 22px; font-weight: 700; }
  .stat-item .label { font-size: 11px; opacity: 0.85; }
  
  .search-box {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .search-box label {
    display: block;
    font-size: 14px;
    color: #666;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .search-input-wrap {
    display: flex;
    gap: 10px;
  }
  .search-input {
    flex: 1;
    padding: 14px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: #667eea; }
  .search-btn {
    padding: 14px 24px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .search-btn:active { transform: scale(0.96); }
  
  .result-box {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    display: none;
  }
  .result-box.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .parent-info {
    padding-bottom: 16px;
    border-bottom: 1px dashed #e0e0e0;
    margin-bottom: 16px;
  }
  .parent-info h2 { font-size: 20px; color: #333; margin-bottom: 8px; }
  .parent-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 13px;
    color: #666;
  }
  .parent-meta span {
    background: #f5f5f5;
    padding: 4px 10px;
    border-radius: 20px;
  }
  
  .child-card {
    border: 2px solid #f0f0f0;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .child-card:last-child { margin-bottom: 0; }
  .child-card.received { border-color: #4caf50; background: #f8fff8; }
  .child-card.received::before {
    content: "✓ 已领取";
    position: absolute;
    top: 10px;
    right: 10px;
    background: #4caf50;
    color: white;
    font-size: 11px;
    font-weight: bold;
    padding: 3px 10px;
    border-radius: 20px;
  }
  
  .child-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .child-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    flex-shrink: 0;
  }
  .child-avatar.boy { background: #e3f2fd; color: #1976d2; }
  .child-avatar.girl { background: #fce4ec; color: #c2185b; }
  .child-avatar.unknown { background: #f5f5f5; color: #666; }
  .child-name { font-size: 18px; font-weight: 700; color: #333; }
  .child-raw { font-size: 12px; color: #999; margin-top: 2px; }
  
  .child-details {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  .detail-item {
    text-align: center;
    padding: 10px 6px;
    background: #fafafa;
    border-radius: 10px;
  }
  .detail-item .label { font-size: 11px; color: #999; margin-bottom: 4px; }
  .detail-item .value { font-size: 16px; font-weight: 700; color: #333; }
  .detail-item .value.size { color: #e53935; font-size: 20px; }
  
  .receive-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .receive-btn:not(.received) {
    background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(238, 90, 36, 0.3);
  }
  .receive-btn:not(.received):active { transform: scale(0.98); }
  .receive-btn.received {
    background: #e8f5e9;
    color: #4caf50;
    cursor: default;
  }
  
  .admin-section {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-top: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .admin-section h3 {
    font-size: 16px;
    color: #333;
    margin-bottom: 12px;
  }
  .admin-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 8px;
  }
  .admin-btn.primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }
  .admin-btn.secondary {
    background: #f5f5f5;
    color: #333;
  }
  
  .reset-link {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: #999;
    cursor: pointer;
    text-decoration: underline;
  }
  .reset-link:hover { color: #667eea; }
  
  .footer {
    text-align: center;
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    margin-top: 24px;
    padding-bottom: 20px;
  }
  
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: #333;
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 1000;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white;
    border-radius: 16px;
    padding: 20px;
    max-width: 90%;
    max-height: 80vh;
    overflow: auto;
    width: 400px;
  }
  .modal h3 { margin-bottom: 12px; }
  .modal pre {
    background: #f5f5f5;
    padding: 10px;
    border-radius: 8px;
    font-size: 12px;
    overflow: auto;
    max-height: 200px;
  }
  .modal-close {
    margin-top: 12px;
    padding: 10px 20px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🏃 亲子跑活动签到</h1>
    <p>输入报名手机号，领取活动物资</p>
  </div>
  
  <div class="stats-bar">
    <div class="stat-item">
      <div class="num" id="statTotal">0</div>
      <div class="label">总报名</div>
    </div>
    <div class="stat-item">
      <div class="num" id="statKids">0</div>
      <div class="label">总孩子</div>
    </div>
    <div class="stat-item">
      <div class="num" id="statReceived">0</div>
      <div class="label">已领取</div>
    </div>
  </div>
  
  <div class="search-box">
    <label>📱 请输入报名手机号</label>
    <div class="search-input-wrap">
      <input type="tel" class="search-input" id="phoneInput" placeholder="例如: 18301443350" maxlength="11">
      <button class="search-btn" id="searchBtn" onclick="searchPhone()">查询</button>
    </div>
  </div>
  
  <div class="result-box" id="resultBox">
    <div id="resultContent"></div>
    <div class="reset-link" onclick="resetSearch()">← 查询其他手机号</div>
  </div>
  
  <div class="admin-section">
    <h3>🔧 工作人员功能</h3>
    <button class="admin-btn primary" onclick="exportData()">📥 导出领取记录</button>
    <button class="admin-btn secondary" onclick="showStats()">📊 查看统计</button>
    <button class="admin-btn secondary" onclick="clearAllData()">🗑️ 清空所有数据</button>
  </div>
  
  <div class="footer">
    亲子跑活动组委会 · 签到系统
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">标题</h3>
    <pre id="modalContent">内容</pre>
    <button class="modal-close" onclick="closeModal()">关闭</button>
  </div>
</div>

<script>
// 完整数据
const registrations = [
  {"name":"安柯","phone":"18301443350","grade":"2015级医院管理","children":[{"name":"柠檬","gender":"男","age":"3岁","height":"105㎝","raw":"柠檬-男-3岁-105㎝"}]},
  {"name":"安學","phone":"13632680885","grade":"2002軟件工程碩士","children":[{"name":"Edward","gender":"男","age":"14岁","height":"160cm","raw":"Edward-男-14岁-160cm"}]},
  {"name":"陈芳","phone":"13510084071","grade":"2020 年开始在深研院工作","children":[{"name":"一蔓","gender":"未知","age":"11岁","height":"145cm","raw":"一蔓 11 岁，145"},{"name":"墨墨","gender":"未知","age":"11岁","height":"150cm","raw":"墨墨 11 岁 150"}]},
  {"name":"陈俊","phone":"13902942749","grade":"","children":[{"name":"依依","gender":"女","age":"9岁","height":"140cm","raw":"依依——女——9岁——140"}]},
  {"name":"陈沫瑶","phone":"13823508910","grade":"","children":[{"name":"多米","gender":"女","age":"5岁","height":"115cm","raw":"多米-女- 5 岁-115cm"}]},
  {"name":"陈其祥","phone":"15370996129","grade":"","children":[{"name":"陈玥","gender":"女","age":"7岁","height":"120cm","raw":"陈玥-女-7岁-120cm"},{"name":"陈果","gender":"男","age":"13岁","height":"160cm","raw":"陈果-男-13岁-160cm"}]},
  {"name":"陈绮慧","phone":"13760262336","grade":"","children":[{"name":"城城","gender":"男","age":"13岁","height":"145cm","raw":"城城-男-13岁-145cm，森森-男-10岁-140cm"}]},
  {"name":"陈晓君","phone":"18566263832","grade":"","children":[{"name":"曦曦","gender":"女","age":"10岁","height":"150cm","raw":"曦曦-女-10岁-150cm"}]},
  {"name":"程红美","phone":"18128857446","grade":"","children":[{"name":"早早","gender":"男","age":"9岁","height":"155cm","raw":"早早 男 9岁 155"}]},
  {"name":"戴文正","phone":"18500957620","grade":"","children":[{"name":"Regene","gender":"女","age":"9岁","height":"150cm","raw":"Regene-女-9岁-150cm"}]}
];

// 状态管理
function getStorageKey() { return 'parent_run_2025_received'; }

function getReceivedState() {
  try {
    return JSON.parse(localStorage.getItem(getStorageKey()) || '{}');
  } catch { return {}; }
}

function setChildReceived(phone, childIndex, received) {
  const state = getReceivedState();
  if (!state[phone]) state[phone] = {};
  state[phone][childIndex] = received;
  localStorage.setItem(getStorageKey(), JSON.stringify(state));
  updateStats();
}

function isChildReceived(phone, childIndex) {
  const state = getReceivedState();
  return state[phone] && state[phone][childIndex] === true;
}

// 统计
function updateStats() {
  let totalKids = 0;
  let receivedKids = 0;
  const state = getReceivedState();
  
  registrations.forEach(reg => {
    totalKids += reg.children.length;
    if (state[reg.phone]) {
      reg.children.forEach((_, idx) => {
        if (state[reg.phone][idx]) receivedKids++;
      });
    }
  });
  
  document.getElementById('statTotal').textContent = registrations.length;
  document.getElementById('statKids').textContent = totalKids;
  document.getElementById('statReceived').textContent = receivedKids;
}

// 搜索 - 使用宽松比较
function searchPhone() {
  const input = document.getElementById('phoneInput');
  const phone = String(input.value.trim());
  
  if (!phone) {
    showToast('请输入手机号');
    return;
  }
  if (!/^\d{11}$/.test(phone)) {
    showToast('请输入11位手机号');
    return;
  }
  
  const reg = registrations.find(r => String(r.phone) === phone);
  if (!reg) {
    showToast('未找到该手机号的报名信息');
    return;
  }
  
  renderResult(reg);
}

function renderResult(reg) {
  const resultBox = document.getElementById('resultBox');
  const content = document.getElementById('resultContent');
  
  let childrenHtml = '';
  reg.children.forEach((child, idx) => {
    const received = isChildReceived(reg.phone, idx);
    const genderClass = child.gender === '男' ? 'boy' : (child.gender === '女' ? 'girl' : 'unknown');
    const genderEmoji = child.gender === '男' ? '👦' : (child.gender === '女' ? '👧' : '👶');
    const btnText = received ? '✓ 已领取衣服' : '👕 点击领取衣服';
    const btnClass = received ? 'received' : '';
    const cardClass = received ? 'received' : '';
    
    childrenHtml += `
      <div class="child-card ${cardClass}" id="childCard_${idx}">
        <div class="child-header">
          <div class="child-avatar ${genderClass}">${genderEmoji}</div>
          <div>
            <div class="child-name">${child.name}</div>
            <div class="child-raw">${child.raw}</div>
          </div>
        </div>
        <div class="child-details">
          <div class="detail-item">
            <div class="label">性别</div>
            <div class="value">${child.gender}</div>
          </div>
          <div class="detail-item">
            <div class="label">年龄</div>
            <div class="value">${child.age || '-'}</div>
          </div>
          <div class="detail-item">
            <div class="label">身高/尺码</div>
            <div class="value size">${child.height || '-'}</div>
          </div>
        </div>
        <button class="receive-btn ${btnClass}" id="btn_${idx}" onclick="toggleReceive('${reg.phone}', ${idx})">
          ${btnText}
        </button>
      </div>
    `;
  });
  
  content.innerHTML = `
    <div class="parent-info">
      <h2>👤 ${reg.name}</h2>
      <div class="parent-meta">
        <span>📱 ${reg.phone}</span>
        <span>🎓 ${reg.grade || '未填写'}</span>
        <span>👶 ${reg.children.length}个孩子</span>
      </div>
    </div>
    <div class="children-list">
      ${childrenHtml}
    </div>
  `;
  
  resultBox.classList.add('show');
  document.querySelector('.search-box').style.display = 'none';
}

function toggleReceive(phone, childIndex) {
  const received = isChildReceived(phone, childIndex);
  if (received) {
    if (!confirm('该孩子已标记为领取，是否取消？')) return;
    setChildReceived(phone, childIndex, false);
  } else {
    setChildReceived(phone, childIndex, true);
    showToast('✓ 领取成功！');
  }
  refreshCard(phone, childIndex);
}

function refreshCard(phone, childIndex) {
  const reg = registrations.find(r => String(r.phone) === String(phone));
  if (!reg) return;
  const received = isChildReceived(phone, childIndex);
  
  const card = document.getElementById('childCard_' + childIndex);
  const btn = document.getElementById('btn_' + childIndex);
  
  if (received) {
    card.classList.add('received');
    btn.classList.add('received');
    btn.textContent = '✓ 已领取衣服';
  } else {
    card.classList.remove('received');
    btn.classList.remove('received');
    btn.textContent = '👕 点击领取衣服';
  }
}

function resetSearch() {
  document.getElementById('resultBox').classList.remove('show');
  document.querySelector('.search-box').style.display = 'block';
  document.getElementById('phoneInput').value = '';
  document.getElementById('phoneInput').focus();
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// 导出功能
function exportData() {
  const state = getReceivedState();
  let csv = '家长姓名,手机号,孩子姓名,性别,年龄,身高,领取状态,领取时间\n';
  
  registrations.forEach(reg => {
    reg.children.forEach((child, idx) => {
      const received = isChildReceived(reg.phone, idx);
      csv += `${reg.name},${reg.phone},${child.name},${child.gender},${child.age},${child.height},${received ? '已领取' : '未领取'},${received ? new Date().toLocaleString() : ''}\n`;
    });
  });
  
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = '亲子跑领取记录_' + new Date().toLocaleDateString() + '.csv';
  link.click();
  
  showToast('✓ 导出成功！');
}

function showStats() {
  const state = getReceivedState();
  let stats = '=== 领取统计 ===\n\n';
  let receivedCount = 0;
  let totalCount = 0;
  
  registrations.forEach(reg => {
    reg.children.forEach((child, idx) => {
      totalCount++;
      if (isChildReceived(reg.phone, idx)) {
        receivedCount++;
        stats += `✓ ${reg.name} - ${child.name}\n`;
      }
    });
  });
  
  stats += `\n总计: ${receivedCount}/${totalCount} 已领取`;
  stats += `\n完成率: ${((receivedCount/totalCount)*100).toFixed(1)}%`;
  
  showModal('领取统计', stats);
}

function clearAllData() {
  if (!confirm('确定要清空所有领取记录吗？此操作不可恢复！')) return;
  localStorage.removeItem(getStorageKey());
  updateStats();
  showToast('✓ 已清空所有数据');
}

function showModal(title, content) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalContent').textContent = content;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// 初始化
document.getElementById('phoneInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') searchPhone();
});

updateStats();
</script>
</body>
</html>
