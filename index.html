<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>测试</title>
</head>
<body>
<input type="text" id="phone" placeholder="输入手机号">
<button onclick="test()">测试</button>
<div id="result"></div>

<script>
const registrations = [
  {"name": "安柯", "phone": "18301443350", "children": [{"name": "柠檬"}]},
  {"name": "陈芳", "phone": "13510084071", "children": [{"name": "一蔓"}, {"name": "墨墨"}]}
];

function test() {
  const phone = document.getElementById('phone').value.trim();
  const reg = registrations.find(r => r.phone === phone);
  document.getElementById('result').innerHTML = 
    '输入: [' + phone + '] 长度: ' + phone.length + 
    '<br>找到: ' + (reg ? reg.name : '未找到') +
    '<br>数据中的第一个手机号: [' + registrations[0].phone + '] 长度: ' + registrations[0].phone.length;
}
</script>
</body>
</html>
