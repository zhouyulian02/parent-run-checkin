<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>签到测试</title>
<style>
body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
input { width: 100%; padding: 10px; font-size: 16px; margin: 10px 0; }
button { width: 100%; padding: 12px; font-size: 16px; background: #667eea; color: white; border: none; border-radius: 5px; }
.result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 10px; }
.debug { background: #333; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; margin-top: 10px; }
</style>
</head>
<body>
<h1>🏃 亲子跑签到测试</h1>
<input type="tel" id="phone" placeholder="输入手机号" value="18301443350">
<button onclick="search()">查询</button>
<div class="debug" id="debug">点击查询按钮...</div>
<div id="result"></div>

<script>
const registrations = [
  {"name":"安柯","phone":"18301443350","children":[{"name":"柠檬","gender":"男","age":"3岁","height":"105㎝"}]},
  {"name":"陈芳","phone":"13510084071","children":[{"name":"一蔓","gender":"女","age":"11岁","height":"145cm"},{"name":"墨墨","gender":"女","age":"11岁","height":"150cm"}]}
];

function search() {
  const phone = document.getElementById('phone').value.trim();
  const debug = document.getElementById('debug');
  
  let info = '输入: [' + phone + '] 长度:' + phone.length + '\n';
  info += '正则: ' + /^\d{11}$/.test(phone) + '\n';
  
  const reg = registrations.find(r => r.phone === phone);
  info += '查找: ' + (reg ? '✓ ' + reg.name : '✗ 未找到') + '\n';
  info += '数据0: [' + registrations[0].phone + ']\n';
  info += '全等: ' + (phone === registrations[0].phone);
  
  debug.textContent = info;
  
  if (reg) {
    let html = '<h2>' + reg.name + '</h2>';
    reg.children.forEach(c => {
      html += '<div class="result"><b>' + c.name + '</b> ' + c.gender + ' ' + c.age + ' ' + c.height + '</div>';
    });
    document.getElementById('result').innerHTML = html;
  } else {
    document.getElementById('result').innerHTML = '<div style="color:red">未找到</div>';
  }
}
</script>
</body>
</html>
